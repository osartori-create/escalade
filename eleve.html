<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saisie Grimpeur - EPS Climb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="text-white min-h-screen font-sans flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800/80 backdrop-blur-xl p-8 rounded-[2.5rem] border border-white/10 shadow-2xl">
        <h1 class="text-4xl font-black italic text-center text-blue-500 mb-8 tracking-tighter uppercase">EPS CLIMB</h1>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 tracking-widest italic">1. Choisis ta classe</label>
                <select id="class-select" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl p-4 text-xl font-bold text-white outline-none focus:border-blue-500 appearance-none">
                    <option value="">Chargement des classes...</option>
                </select>
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 tracking-widest italic">2. Ton code (ex: 3A, 10C)</label>
                <input type="text" id="id-input" maxlength="4" placeholder="Tape ton code ici" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl p-5 text-3xl font-black text-blue-400 uppercase text-center outline-none focus:border-blue-500 shadow-inner">
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 tracking-widest italic">3. Cotation réussie</label>
                <div class="grid grid-cols-3 gap-2 mt-2" id="difficulty-grid">
                    </div>
            </div>

            <button onclick="sendData()" id="send-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 py-6 rounded-3xl text-xl font-black uppercase tracking-widest shadow-xl btn-active transition-all mt-4">Envoyer ma montée !</button>
            
            <div id="status-msg" class="text-center font-bold h-8 flex items-center justify-center text-lg mt-2"></div>
        </div>
    </div>

    <script>
        // --- CONFIG FIREBASE (IDENTIQUE AU MAITRE) ---
        const firebaseConfig = { 
            apiKey: "AIzaSyB9dpOvwWiiLEV8HDYWlSA00dcApfmBlcY", 
            databaseURL: "https://eps-escalade-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "eps-escalade" 
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const bareme = { "4a": 1, "4b": 1.1, "4c": 1.2, "5a": 1.3, "5b": 1.4, "5c": 1.5, "6a": 1.6, "6b": 1.8, "6c": 2 };
        let selectedDiff = "4a";

        // Initialisation de la grille de difficulté
        const grid = document.getElementById('difficulty-grid');
        Object.keys(bareme).forEach(cot => {
            const btn = document.createElement('button');
            btn.innerText = cot.toUpperCase();
            btn.id = "btn-" + cot;
            btn.className = "py-3 rounded-xl font-black border-2 border-slate-700 bg-slate-900/50 hover:bg-slate-700 transition-all";
            btn.onclick = () => selectDifficulty(cot);
            grid.appendChild(btn);
        });

        function selectDifficulty(cot) {
            selectedDiff = cot;
            Object.keys(bareme).forEach(c => {
                const b = document.getElementById("btn-" + c);
                b.classList.toggle('border-blue-500', c === cot);
                b.classList.toggle('bg-blue-600', c === cot);
            });
        }
        selectDifficulty("4a");

        // Chargement des classes actives
        db.ref('active_classes').on('value', snap => {
            const select = document.getElementById('class-select');
            const data = snap.val();
            if (!data) {
                select.innerHTML = '<option value="">Aucune classe active</option>';
                return;
            }
            const classes = Object.keys(data);
            select.innerHTML = '<option value="">-- Sélectionne --</option>' + 
                               classes.map(c => `<option value="${c}">${c}</option>`).join('');
        });

        function sendData() {
            const classId = document.getElementById('class-select').value;
            const codeInput = document.getElementById('id-input').value.toUpperCase().trim();
            const btn = document.getElementById('send-btn');
            const status = document.getElementById('status-msg');

            if(!classId || codeInput.length < 2) {
                status.innerText = "❌ Erreur de saisie !";
                status.className = "text-red-400 font-bold mt-2";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Envoi en cours...";

            const g = codeInput.slice(0, -1);
            const r = codeInput.slice(-1);
            const points = 9 * (bareme[selectedDiff] || 1);

            db.ref(classId + '/montees').push({
                groupe: g,
                role: r,
                voie: selectedDiff,
                hauteur: 9,
                points: points,
                timestamp: Date.now()
            }).then(() => {
                status.innerText = "✅ MONTÉE VALIDÉE !";
                status.className = "text-emerald-400 font-bold mt-2";
                document.getElementById('id-input').value = "";
                
                setTimeout(() => {
                    status.innerText = "";
                    btn.disabled = false;
                    btn.innerText = "Envoyer ma montée !";
                }, 2500);
            }).catch(err => {
                status.innerText = "❌ Erreur de connexion";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
