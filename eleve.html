<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saisie Élève - Escalade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800 p-8 rounded-[2.5rem] border border-slate-700 shadow-2xl">
        <h1 class="text-3xl font-black italic text-center text-blue-500 mb-8 tracking-tighter uppercase">Saisie Grimpeur</h1>

        <div class="space-y-6">
            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 tracking-widest italic">1. Choisis ta classe</label>
                <select id="class-select" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl p-4 text-xl font-bold text-white outline-none focus:border-blue-500 appearance-none">
                    <option value="">Chargement...</option>
                </select>
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 tracking-widest italic">2. Ton identifiant (ex: 3A)</label>
                <input type="text" id="id-input" maxlength="4" placeholder="Ex: 5B" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl p-4 text-2xl font-black text-blue-400 uppercase text-center outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-2 tracking-widest italic">3. Cotation de la voie</label>
                <select id="voie-select" class="w-full bg-slate-900 border-2 border-slate-700 rounded-2xl p-4 text-2xl font-black text-white outline-none focus:border-blue-500 appearance-none">
                    <option value="4a">4A</option><option value="4b">4B</option><option value="4c">4C</option>
                    <option value="5a">5A</option><option value="5b">5B</option><option value="5c">5C</option>
                    <option value="6a">6A</option><option value="6b">6B</option><option value="6c">6C</option>
                </select>
            </div>

            <button onclick="sendData()" id="send-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 py-6 rounded-3xl text-xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition-all">Envoyer ma montée !</button>
            <p id="msg" class="text-center font-bold h-6"></p>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB9dpOvwWiiLEV8HDYWlSA00dcApfmBlcY", databaseURL: "https://eps-escalade-default-rtdb.europe-west1.firebasedatabase.app", projectId: "eps-escalade" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const bareme = { "4a": 1, "4b": 1.1, "4c": 1.2, "5a": 1.3, "5b": 1.4, "5c": 1.5, "6a": 1.6, "6b": 1.8, "6c": 2 };

        // Chargement automatique des classes actives
        db.ref('active_classes').on('value', snap => {
            const select = document.getElementById('class-select');
            const classes = snap.val() ? Object.keys(snap.val()) : [];
            if(classes.length === 0) {
                select.innerHTML = '<option value="">Aucune classe active</option>';
            } else {
                select.innerHTML = '<option value="">-- Sélectionne --</option>' + 
                                   classes.map(c => `<option value="${c}">${c}</option>`).join('');
            }
        });

        function sendData() {
            const classId = document.getElementById('class-select').value;
            const id = document.getElementById('id-input').value.toUpperCase().trim();
            const voie = document.getElementById('voie-select').value;
            const btn = document.getElementById('send-btn');
            const msg = document.getElementById('msg');

            if(!classId || id.length < 2) {
                alert("Sélectionne une classe et entre ton identifiant !");
                return;
            }

            btn.disabled = true; btn.innerText = "Envoi...";
            const g = id.slice(0,-1), r = id.slice(-1);
            const h = 9; // Hauteur par défaut
            const pts = h * (bareme[voie] || 1);

            db.ref(classId + '/montees').push({
                groupe: g, role: r, voie: voie, hauteur: h, points: pts, time: Date.now()
            }).then(() => {
                msg.innerText = "✅ VALIDÉ !"; msg.className = "text-center text-emerald-400 font-bold";
                setTimeout(() => { 
                    msg.innerText = ""; btn.disabled = false; btn.innerText = "Envoyer ma montée !";
                    document.getElementById('id-input').value = "";
                }, 2000);
            });
        }
    </script>
</body>
</html>
