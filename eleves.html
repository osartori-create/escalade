<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EPS Escalade - Multi-Classes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { touch-action: manipulation; font-family: -apple-system, sans-serif; }
        .active-btn { background-color: #2563eb !important; color: white !important; border-color: #1d4ed8 !important; transform: scale(0.96); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div id="step-0" class="w-full max-w-lg bg-white rounded-[2rem] shadow-2xl p-8 space-y-6">
        <div class="text-center">
            <h1 class="text-3xl font-black text-slate-800 italic uppercase">EPS CLIMB</h1>
            <p class="text-slate-400 font-bold text-xs tracking-widest uppercase">Choix de la classe</p>
        </div>
        <div class="grid grid-cols-2 gap-4" id="class-grid">
            <button onclick="startSession('402')" class="py-6 rounded-2xl font-black text-2xl border-2 border-slate-100 bg-slate-50 text-slate-600 active:bg-blue-600 active:text-white transition-all">402</button>
            <button onclick="startSession('301')" class="py-6 rounded-2xl font-black text-2xl border-2 border-slate-100 bg-slate-50 text-slate-600 active:bg-blue-600 active:text-white transition-all">301</button>
            <button onclick="startSession('EPS_TEST')" class="col-span-2 py-4 rounded-xl border-2 border-dashed border-slate-200 text-slate-400 font-bold">Classe de Test</button>
        </div>
    </div>

    <div id="step-1" class="hidden w-full max-w-lg bg-white rounded-[2rem] shadow-2xl p-8 space-y-8 border border-slate-100">
        <div class="flex justify-between items-center">
            <span id="current-class-badge" class="bg-slate-800 text-white px-3 py-1 rounded-full text-xs font-bold"></span>
            <button onclick="location.reload()" class="text-slate-400 text-xs font-bold uppercase underline">Changer Classe</button>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-2">Numéro du Groupe</label>
                <div class="grid grid-cols-5 gap-3 mt-2" id="group-grid"></div>
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-2">Lettre Grimpeur</label>
                <div class="flex gap-4 mt-2">
                    <button onclick="selectRole('A', this)" class="role-btn flex-1 py-5 rounded-2xl font-black text-2xl bg-slate-50 text-slate-600 border-2 border-slate-100 transition-all">A</button>
                    <button onclick="selectRole('B', this)" class="role-btn flex-1 py-5 rounded-2xl font-black text-2xl bg-slate-50 text-slate-600 border-2 border-slate-100 transition-all">B</button>
                    <button onclick="selectRole('C', this)" class="role-btn flex-1 py-5 rounded-2xl font-black text-2xl bg-slate-50 text-slate-600 border-2 border-slate-100 transition-all">C</button>
                </div>
            </div>
        </div>
        <button id="btn-start" disabled onclick="goToStep2()" class="w-full bg-slate-200 text-slate-400 py-6 rounded-2xl text-xl font-black uppercase tracking-widest transition-all">Commencer</button>
    </div>

    <div id="step-2" class="hidden w-full max-w-lg bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-100">
        <div class="bg-blue-600 p-6 text-white flex justify-between items-center">
            <div>
                <p id="label-recap" class="font-black text-2xl leading-none italic uppercase"></p>
                <p class="text-blue-100 text-xs font-bold uppercase tracking-widest mt-1">Nouvelle montée</p>
            </div>
            <button onclick="resetApp()" class="bg-blue-800 px-4 py-2 rounded-xl text-xs font-bold uppercase border border-blue-400/30">Annuler</button>
        </div>

        <div class="p-8 space-y-8">
            <div class="relative">
                <label class="text-xs font-bold text-slate-500 uppercase ml-2">Voie et Couleur</label>
                <input type="text" id="voieInput" placeholder="Ex: 12 BLEUE" oninput="liveSearchVoie(this.value)" class="w-full border-2 border-slate-100 rounded-2xl p-5 text-2xl font-bold uppercase focus:border-blue-500 outline-none bg-slate-50">
                <div id="info-cotation" class="mt-3 p-4 bg-blue-50 rounded-xl flex justify-between items-center hidden">
                    <span class="text-blue-900 font-bold italic">Difficulté : <span id="txt-diff" class="not-italic text-2xl"></span></span>
                    <button onclick="ouvrirModalDiff()" class="text-xs bg-white border border-blue-200 px-3 py-2 rounded-lg font-bold text-blue-600 shadow-sm">MODIFIER</button>
                </div>
            </div>
            <div>
                <label class="text-xs font-bold text-slate-500 uppercase ml-2">Hauteur (m)</label>
                <div class="flex gap-4">
                    <button onclick="document.getElementById('hauteurInput').value=9" class="bg-slate-100 px-6 py-4 rounded-xl font-black text-xl border-2 border-transparent active:border-blue-500">9m</button>
                    <input type="number" id="hauteurInput" value="9" class="flex-1 border-2 border-slate-100 rounded-2xl p-4 text-center text-2xl font-black bg-slate-50">
                </div>
            </div>
            <button onclick="validerMontee()" class="w-full bg-emerald-500 text-white py-6 rounded-2xl text-2xl font-black shadow-lg uppercase active:scale-95 transition-all">Valider</button>
        </div>
    </div>

    <div id="modal-diff" class="fixed inset-0 bg-slate-900/80 hidden flex items-center justify-center p-6 z-50">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 uppercase italic mb-4">Cotation de la voie</h3>
            <div class="grid grid-cols-3 gap-2" id="grid-coeffs"></div>
        </div>
    </div>

    <script>
        // 1. CONFIGURATION FIREBASE (À REMPLACER)
        const firebaseConfig = {
  apiKey: "AIzaSyB9dpOvwWiiLEV8HDYWlSA00dcApfmBlcY",
  authDomain: "eps-escalade.firebaseapp.com",
  projectId: "eps-escalade",
  storageBucket: "eps-escalade.firebasestorage.app",
  messagingSenderId: "825899222823",
  appId: "1:825899222823:web:cec0b30062ed760fec8b02",
  // AJOUTE LA LIGNE CI-DESSOUS :
  databaseURL: "https://eps-escalade-default-rtdb.europe-west1.firebasedatabase.app"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. DONNÉES TECHNIQUES
        const coeffs = { "(3a)": 0.6, "(3b)": 1, "(3c)": 1.1, "(4a)": 1.2, "(4b)": 1.3, "(4c)": 1.4, "(5a)": 1.5, "(5b)": 1.6, "(5c)": 1.7, "(6a)": 1.8, "(6b)": 1.9, "(6c)": 2 };
        let currentClass = "";
        let selection = { groupe: null, role: null };
        let voiesConnues = {};

        // 3. LOGIQUE DE SESSION
        function startSession(className) {
            currentClass = className;
            document.getElementById('step-0').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('current-class-badge').innerText = "CLASSE : " + className;
            initGrids();
            
            // Synchronisation Firebase du dictionnaire de voies spécifique à la classe
            db.ref(currentClass + '/voies').on('value', (snap) => {
                voiesConnues = snap.val() || {};
            });
        }

        function initGrids() {
            const grid = document.getElementById('group-grid');
            grid.innerHTML = "";
            for(let i=1; i<=10; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = "group-btn py-4 rounded-2xl font-black text-xl bg-slate-50 text-slate-600 border-2 border-slate-100 transition-all";
                btn.onclick = () => {
                    document.querySelectorAll('.group-btn').forEach(b => b.classList.remove('active-btn'));
                    btn.classList.add('active-btn');
                    selection.groupe = i;
                    verifierFormIdentification();
                };
                grid.appendChild(btn);
            }
        }

        function selectRole(lettre, element) {
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active-btn'));
            element.classList.add('active-btn');
            selection.role = lettre;
            verifierFormIdentification();
        }

        function verifierFormIdentification() {
            const btn = document.getElementById('btn-start');
            if(selection.groupe && selection.role) {
                btn.disabled = false;
                btn.className = "w-full bg-blue-600 text-white py-6 rounded-2xl text-xl font-black uppercase tracking-widest shadow-lg shadow-blue-200 transition-all";
            }
        }

        function goToStep2() {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('label-recap').innerText = `Groupe ${selection.groupe} - Grimpeur ${selection.role}`;
        }

        function liveSearchVoie(val) {
            const v = val.toLowerCase().trim();
            const info = document.getElementById('info-cotation');
            if(voiesConnues[v]) {
                document.getElementById('txt-diff').innerText = voiesConnues[v].replace(/[()]/g, '');
                info.classList.remove('hidden');
            } else {
                info.classList.add('hidden');
            }
        }

        function ouvrirModalDiff() {
            const grid = document.getElementById('grid-coeffs');
            grid.innerHTML = '';
            Object.keys(coeffs).forEach(c => {
                const b = document.createElement('button');
                b.innerText = c.replace(/[()]/g, '');
                b.className = "bg-slate-100 py-4 rounded-xl font-bold text-slate-800 border-2 border-transparent active:bg-blue-600 active:text-white transition-all";
                b.onclick = () => {
                    const v = document.getElementById('voieInput').value.toLowerCase().trim();
                    voiesConnues[v] = c;
                    db.ref(currentClass + '/voies/' + v.replace(/\./g, '_')).set(c); // Firebase n'aime pas les points dans les clés
                    document.getElementById('modal-diff').classList.add('hidden');
                    liveSearchVoie(v);
                };
                grid.appendChild(b);
            });
            document.getElementById('modal-diff').classList.remove('hidden');
        }

        function validerMontee() {
            const v = document.getElementById('voieInput').value.toLowerCase().trim();
            const h = parseFloat(document.getElementById('hauteurInput').value);
            if(!v) return alert("Indiquez la voie !");
            if(!voiesConnues[v]) return ouvrirModalDiff();

            const cot = voiesConnues[v];
            const pts = h * coeffs[cot];

            // Envoi Firebase
            db.ref(currentClass + '/montees').push({
                groupe: selection.groupe,
                role: selection.role,
                voie: v,
                cotation: cot,
                hauteur: h,
                points: pts,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });

            alert(`ENREGISTRÉ ✅\nScore : ${pts.toFixed(1)}m`);
            resetApp();
        }

        function resetApp() {
            selection = { groupe: null, role: null };
            document.getElementById('voieInput').value = '';
            document.querySelectorAll('.active-btn').forEach(b => b.classList.remove('active-btn'));
            document.getElementById('btn-start').disabled = true;
            document.getElementById('btn-start').className = "w-full bg-slate-200 text-slate-400 py-6 rounded-2xl text-xl font-black uppercase tracking-widest transition-all";
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
        }
    </script>
</body>
</html>
