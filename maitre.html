<style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    #scroll-area { 
        -webkit-overflow-scrolling: touch; /* Force la fluidité sur iPad */
        overflow-y: auto;
        height: 100%;
    }
    .scrolling-container { scroll-behavior: smooth; }
    .alpiniste { transition: all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
</style>

<script>
    // --- (Garde ta config Firebase et tes variables ici) ---

    // --- NOUVELLE LOGIQUE DE SCROLL ROBUSTE ---
    function toggleAutoScroll() {
        const btn = document.getElementById('scroll-btn');
        const area = document.getElementById('scroll-area');
        
        if (scrollInt) {
            clearInterval(scrollInt);
            scrollInt = null;
            btn.innerText = "Scroll: OFF";
            btn.classList.replace('bg-emerald-600', 'bg-amber-600');
        } else {
            btn.innerText = "Scroll: ON";
            btn.classList.replace('bg-amber-600', 'bg-emerald-600');
            
            scrollInt = setInterval(() => {
                // On calcule l'espace restant à chaque cycle
                const max = area.scrollHeight - area.clientHeight;
                
                if (max <= 0) return;

                if (scrollDirection === 1 && area.scrollTop >= max - 5) {
                    scrollDirection = -1; // Arrivé en bas -> on remonte
                } else if (scrollDirection === -1 && area.scrollTop <= 5) {
                    scrollDirection = 1; // Arrivé en haut -> on redescend
                }
                
                // Déplacement par petit saut pour éviter les saccades Safari
                area.scrollBy({ top: scrollDirection * 2, behavior: 'auto' });
            }, 50);
        }
    }

    // --- NOUVEAU FORMATAGE DES NOMS POUR LA CORDÉE ---
    function formatNameForClimb(fullName) {
        const parts = fullName.split(' ');
        if (parts.length < 2) return fullName;
        
        const nom = parts[0];
        const prenom = parts.slice(1).join(' ');
        // Retourne "A. Amélie"
        return `${nom.charAt(0).toUpperCase()}. ${prenom}`;
    }

    function updateVisual(scores) {
        const area = document.getElementById('climb-area');
        area.innerHTML = "";
        const max = Math.max(...scores.map(s => s.score), 50);
        
        scores.filter(s => s.score > 0).sort((a,b) => b.score - a.score).slice(0, 15).forEach((s, i) => {
            const h = (s.score / max) * 80;
            const c = document.createElement('div');
            c.className = "alpiniste absolute flex flex-col items-center";
            c.style.bottom = h + "%";
            c.style.left = (i * 6.5) + 5 + "%";
            
            // On appelle ici la nouvelle fonction de formatage
            const displayName = formatNameForClimb(s.name);
            
            c.innerHTML = `
                <div class="bg-emerald-500 text-slate-900 font-black px-2 py-0.5 rounded-full text-[10px] mb-1">${s.score.toFixed(0)}m</div>
                <div class="text-4xl">🧗</div>
                <div class="text-[9px] font-bold mt-1 bg-slate-900/80 px-2 rounded-lg whitespace-nowrap">${displayName}</div>
            `;
            area.appendChild(c);
        });
    }

    // --- (Garde toutes tes autres fonctions : import, render, firebase...) ---
</script>
