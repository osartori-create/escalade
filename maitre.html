<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maître - EPS Escalade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #scroll-area, #group-scroll-area, #history-scroll-area { 
            overflow-y: auto; -webkit-overflow-scrolling: touch; height: 100%;
        }
        .tab-active { border-bottom: 4px solid #3b82f6; color: white; background: rgba(59, 130, 246, 0.1); }
        .mountain-view { background: linear-gradient(to top, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans overflow-x-hidden p-4">

    <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4 mb-4 bg-slate-800 p-4 rounded-3xl border border-slate-700 shadow-2xl">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black italic text-blue-500 uppercase tracking-tighter">EPS CLIMB</h1>
            <select id="class-select" onchange="changeClass(this.value)" class="bg-slate-900 border border-slate-600 rounded-xl px-4 py-2 text-xs font-bold text-blue-400">
                <option value="402">402</option><option value="301">301</option><option value="NEW">+ NEW</option>
            </select>
        </div>
        <div class="flex gap-2">
            <button onclick="playWhistle()" class="bg-red-600 px-5 py-2 rounded-xl text-xl shadow-lg active:scale-95">📢</button>
            <button onclick="startTimer()" id="timer-btn" class="bg-emerald-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase italic">Top 60'</button>
            <button onclick="openVisual()" class="bg-indigo-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Cordée</button>
            <button onclick="toggleAutoScroll()" id="scroll-btn" class="bg-amber-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Scroll: OFF</button>
            <button onclick="exportIDoceo()" class="bg-slate-700 px-4 py-2 rounded-xl text-[10px] font-black uppercase italic">iDoceo</button>
            <button onclick="deleteList()" class="bg-red-900 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Vider</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 bg-slate-800 rounded-[2rem] border border-slate-700 shadow-xl flex flex-col h-[650px] overflow-hidden">
            <div class="flex bg-slate-900/50 border-b border-slate-700">
                <button onclick="switchTab('eleves')" id="tab-eleves" class="flex-1 py-3 font-black uppercase text-[10px] tracking-widest text-slate-500 tab-active">👤 Élèves</button>
                <button onclick="switchTab('groupes')" id="tab-groupes" class="flex-1 py-3 font-black uppercase text-[10px] tracking-widest text-slate-500">👥 Groupes</button>
                <button onclick="switchTab('history')" id="tab-history" class="flex-1 py-3 font-black uppercase text-[10px] tracking-widest text-slate-500 italic text-blue-400">✏️ Modif/Log</button>
            </div>

            <div id="view-eleves" class="flex flex-col flex-grow">
                <div id="scroll-area" class="no-scrollbar flex-grow p-2">
                    <table class="w-full text-left border-collapse">
                        <thead class="text-slate-500 text-[9px] uppercase tracking-widest sticky top-0 bg-slate-800 z-10">
                            <tr><th class="p-3">Élève</th><th class="p-3 text-center">Poste</th><th class="p-3 text-center">Voies</th><th class="p-3 text-right pr-6">Points</th></tr>
                        </thead>
                        <tbody id="student-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-groupes" class="flex flex-col flex-grow hidden p-2">
                <div id="group-scroll-area" class="no-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead class="text-slate-500 text-[9px] uppercase tracking-widest sticky top-0 bg-slate-800 z-10">
                            <tr><th class="p-3">Groupe</th><th class="p-3 text-center">Grimpeurs</th><th class="p-3 text-center">Voies</th><th class="p-3 text-right pr-6">Total Mètres</th></tr>
                        </thead>
                        <tbody id="group-table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-history" class="flex flex-col flex-grow hidden p-2">
                <div id="history-scroll-area" class="no-scrollbar">
                    <table class="w-full text-left border-collapse text-xs">
                        <thead class="text-slate-500 text-[9px] uppercase tracking-widest sticky top-0 bg-slate-800 z-10">
                            <tr><th class="p-3">Groupe</th><th class="p-3">Voie</th><th class="p-3">Pts/M</th><th class="p-3 text-right">Action</th></tr>
                        </thead>
                        <tbody id="history-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-slate-800 p-8 rounded-[2rem] border border-slate-700 shadow-xl text-center">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-2 tracking-widest italic">Chrono</p>
                <div id="timer-display" class="text-7xl font-black tabular-nums tracking-tighter">60:00</div>
            </div>
            <div class="bg-slate-800 p-8 rounded-[2rem] border border-slate-700 shadow-xl text-center">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-2 tracking-widest italic">Objectif Classe</p>
                <div class="flex justify-center items-baseline gap-1 mb-4">
                    <span id="total-m" class="text-6xl font-black text-emerald-400">0</span>
                    <span class="text-xl text-slate-500 font-bold">/1000m</span>
                </div>
                <div class="w-full h-4 bg-slate-900 rounded-full p-1 border border-slate-700 overflow-hidden shadow-inner">
                    <div id="progress-bar" class="h-full bg-gradient-to-r from-blue-500 to-emerald-400 rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="visual-view" class="fixed inset-0 mountain-view z-50 hidden flex flex-col items-center justify-end p-10">
        <button onclick="closeVisual()" class="absolute top-10 right-10 bg-white/10 p-4 rounded-full font-bold">✖</button>
        <div id="climb-area" class="w-full max-w-6xl h-full border-l-2 border-white/5 relative flex items-end justify-around pb-24"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyB9dpOvwWiiLEV8HDYWlSA00dcApfmBlcY", databaseURL: "https://eps-escalade-default-rtdb.europe-west1.firebasedatabase.app", projectId: "eps-escalade" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentClass = "402";
        let students = [], assignments = {}, monteesRaw = {};
        let timeLeft = 3600, timerRunning = false, scrollInt = null, scrollDirection = 1;

        function init() {
            students = JSON.parse(localStorage.getItem(`students_${currentClass}`)) || [];
            assignments = JSON.parse(localStorage.getItem(`assign_${currentClass}`)) || {};
            db.ref(currentClass + '/montees').on('value', snap => {
                monteesRaw = snap.val() || {};
                renderAll();
            });
        }

        function switchTab(tab) {
            ['eleves', 'groupes', 'history'].forEach(t => {
                document.getElementById('view-' + t).classList.toggle('hidden', t !== tab);
                document.getElementById('tab-' + t).classList.toggle('tab-active', t === tab);
            });
        }

        // --- SIFFLET ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playWhistle() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const beep = (f, d, v) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = "square"; o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(v, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(); o.stop(audioCtx.currentTime + d);
            };
            beep(2500, 0.2, 0.1); setTimeout(() => beep(2500, 0.5, 0.1), 300);
        }

        // --- RENDU GÉNÉRAL ---
        function renderAll() {
            const list = Object.entries(monteesRaw).map(([id, data]) => ({id, ...data}));
            let totalClasse = 0;
            let groupStats = {};
            let studentScores = [];

            // 1. Calculs
            students.sort((a,b) => a.localeCompare(b, 'fr')).forEach(name => {
                const post = assignments[name] || "";
                const gNum = post.slice(0, -1), rLet = post.slice(-1);
                const perf = list.filter(m => post && m.groupe == gNum && m.role == rLet);
                const score = perf.reduce((a, b) => a + (parseFloat(b.points) || 0), 0);
                
                studentScores.push({name, score, voies: perf.length, post});
                totalClasse += score;

                if(gNum) {
                    if(!groupStats[gNum]) groupStats[gNum] = { grimpeurs: new Set(), voies: 0, metres: 0 };
                    groupStats[gNum].grimpeurs.add(name);
                    groupStats[gNum].voies += perf.length;
                    groupStats[gNum].metres += score;
                }
            });

            // 2. Rendu Table Élèves
            const bodyEleves = document.getElementById('student-table-body');
            bodyEleves.innerHTML = studentScores.map(s => `
                <tr class="border-b border-slate-700/50">
                    <td class="p-3 font-bold text-sm">${s.name}</td>
                    <td class="p-3 text-center"><input type="text" value="${s.post}" onchange="setAssign('${s.name}', this.value)" class="w-12 bg-slate-900 border border-slate-600 rounded text-center text-[10px] font-black text-blue-400 uppercase"></td>
                    <td class="p-3 text-center text-slate-500 font-bold">${s.voies}</td>
                    <td class="p-3 text-right pr-6 font-black text-emerald-400">${s.score.toFixed(1)}</td>
                </tr>`).join('');

            // 3. Rendu Table Groupes
            const bodyGroupes = document.getElementById('group-table-body');
            bodyGroupes.innerHTML = Object.keys(groupStats).sort((a,b) => parseInt(a)-parseInt(b)).map(g => `
                <tr class="border-b border-slate-700/50">
                    <td class="p-4 font-black text-blue-400 italic">GROUPE ${g}</td>
                    <td class="p-4 text-center font-bold text-slate-400">${groupStats[g].grimpeurs.size}</td>
                    <td class="p-4 text-center font-bold">${groupStats[g].voies}</td>
                    <td class="p-4 text-right pr-6 font-black text-emerald-400">${groupStats[g].metres.toFixed(1)}m</td>
                </tr>`).join('');

            // 4. Rendu Historique / Modif
            const bodyHistory = document.getElementById('history-table-body');
            bodyHistory.innerHTML = list.slice().reverse().map(m => `
                <tr class="border-b border-slate-700/50 text-[10px]">
                    <td class="p-2 font-bold">G${m.groupe}${m.role}</td>
                    <td class="p-2"><input type="text" value="${m.voie}" onchange="updateEntry('${m.id}', 'voie', this.value)" class="bg-slate-900 border-none w-20"></td>
                    <td class="p-2"><input type="number" step="0.1" value="${m.points}" onchange="updateEntry('${m.id}', 'points', this.value)" class="bg-slate-900 border-none w-12 text-emerald-400 font-bold"></td>
                    <td class="p-2 text-right"><button onclick="deleteEntry('${m.id}')" class="text-red-500 font-bold">Suppr.</button></td>
                </tr>`).join('');

            document.getElementById('total-m').innerText = Math.round(totalClasse);
            document.getElementById('progress-bar').style.width = Math.min((totalClasse/1000)*100, 100) + "%";
            if(!document.getElementById('visual-view').classList.contains('hidden')) updateVisual(studentScores);
        }

        // --- ACTIONS MODIFICATION ---
        function updateEntry(id, field, val) {
            let newVal = (field === 'points') ? parseFloat(val) : val;
            db.ref(currentClass + '/montees/' + id).update({ [field]: newVal });
        }
        function deleteEntry(id) {
            if(confirm("Supprimer cette montée ?")) db.ref(currentClass + '/montees/' + id).remove();
        }

        // --- SCROLL AUTOMATIQUE (FIXÉ) ---
        function toggleAutoScroll() {
            const btn = document.getElementById('scroll-btn');
            const area = document.getElementById('scroll-area'); 
            if (scrollInt) {
                clearInterval(scrollInt); scrollInt = null;
                btn.innerText = "Scroll: OFF"; btn.classList.replace('bg-emerald-600', 'bg-amber-600');
            } else {
                btn.innerText = "Scroll: ON"; btn.classList.replace('bg-amber-600', 'bg-emerald-600');
                scrollInt = setInterval(() => {
                    const max = area.scrollHeight - area.clientHeight;
                    if (max <= 0) return;
                    if (scrollDirection === 1 && area.scrollTop >= max - 5) scrollDirection = -1;
                    else if (scrollDirection === -1 && area.scrollTop <= 5) scrollDirection = 1;
                    area.scrollTop += scrollDirection * 1.5;
                }, 40);
            }
        }

        // --- AUTRES FONCTIONS ---
        function setAssign(name, val) {
            assignments[name] = val.toUpperCase().trim();
            localStorage.setItem(`assign_${currentClass}`, JSON.stringify(assignments));
            renderAll();
        }
        function startTimer() {
            if(timerRunning) return; timerRunning = true; playWhistle();
            setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }
        function openVisual() { document.getElementById('visual-view').classList.remove('hidden'); renderAll(); }
        function closeVisual() { document.getElementById('visual-view').classList.add('hidden'); }
        function changeClass(v) { currentClass = (v === "NEW") ? (prompt("Nom classe :") || currentClass) : v; init(); }
        function deleteList() { if(confirm("Vider ?")) { localStorage.clear(); location.reload(); } }
        function importStudents(input) {
            const reader = new FileReader(); reader.readAsText(input.files[0], "ISO-8859-1"); 
            reader.onload = (e) => {
                let list = e.target.result.split(/\r?\n/).map(r => r.replace(/;/g,' ').replace(/"/g,'').trim()).filter(r => r.length > 3);
                if(list.length > 0 && list[0].toLowerCase().includes("nom")) list.shift();
                students = list; localStorage.setItem(`students_${currentClass}`, JSON.stringify(students));
                renderAll();
            };
        }
        function updateVisual(scores) {
            const area = document.getElementById('climb-area'); area.innerHTML = "";
            const max = Math.max(...scores.map(s => s.score), 50);
            scores.filter(s => s.score > 0).sort((a,b) => b.score - a.score).slice(0, 15).forEach((s, i) => {
                const h = (s.score / max) * 85;
                const climber = document.createElement('div');
                climber.className = "alpiniste absolute flex flex-col items-center";
                climber.style.bottom = h + "%"; climber.style.left = (i * 6.5) + 5 + "%";
                const parts = s.name.split(' ');
                const display = parts.length >= 2 ? `${parts[0].charAt(0).toUpperCase()}. ${parts.slice(1).join(' ')}` : s.name;
                climber.innerHTML = `<div class="bg-emerald-500 text-slate-900 font-black px-2 py-0.5 rounded-full text-[10px] mb-1 shadow-lg">${s.score.toFixed(0)}m</div><div class="text-4xl">🧗</div><div class="text-[9px] font-bold mt-1 bg-slate-900/80 px-2 rounded-lg">${display}</div>`;
                area.appendChild(climber);
            });
        }
        function exportIDoceo() {
            let csv = "Nom,Total_Metres,Nb_Voies\n";
            students.forEach(n => {
                const p = assignments[n] || "";
                const perf = Object.values(monteesRaw).filter(m => p && m.groupe == p.slice(0,-1) && m.role == p.slice(-1));
                csv += `${n},${perf.reduce((a,b) => a+(parseFloat(b.points)||0), 0).toFixed(2)},${perf.length}\n`;
            });
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `Export_${currentClass}.csv`; a.click();
        }

        init();
    </script>
</body>
</html>
