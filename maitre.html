<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maître - EPS Climb Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { border-bottom: 4px solid #3b82f6 !important; color: white !important; background: rgba(59, 130, 246, 0.2); }
        .mountain-view { background: linear-gradient(to top, #0f172a 0%, #1e293b 100%); }
        .tab-btn { pointer-events: auto !important; z-index: 50; cursor: pointer; }
        #view-eleves, #view-groupes, #view-history { -webkit-overflow-scrolling: touch; overflow-y: auto; height: 100%; }
        .alpiniste { transition: all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen font-sans p-4 overflow-hidden">

    <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4 mb-4 bg-slate-800 p-4 rounded-3xl border border-slate-700 shadow-2xl relative z-40">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black italic text-blue-500 uppercase tracking-tighter">EPS CLIMB</h1>
            <div class="flex items-center gap-2 bg-slate-900 p-1 rounded-xl border border-slate-700">
                <select id="class-select" onchange="changeClass(this.value)" class="bg-transparent px-3 py-1 text-xs font-bold text-blue-400 outline-none">
                    <option value="">Chargement...</option>
                </select>
                <button onclick="createNewClass()" class="bg-blue-600 hover:bg-blue-500 w-8 h-8 rounded-lg flex items-center justify-center font-bold text-lg">+</button>
            </div>
        </div>

        <div class="flex gap-2 flex-wrap">
            <label class="cursor-pointer bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase">
                📥 CSV <input type="file" accept=".csv" class="hidden" onchange="importStudents(this)">
            </label>
            <button onclick="exportIDoceo()" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-2 rounded-xl text-[10px] font-black uppercase italic">📊 iDoceo</button>
            <button onclick="playWhistle()" class="bg-red-600 px-4 py-2 rounded-xl text-xl active:scale-95">📢</button>
            <button onclick="startTimer()" id="timer-btn" class="bg-emerald-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">Top 60'</button>
            <button onclick="toggleAutoScroll()" id="scroll-btn" class="bg-amber-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase">Scroll: OFF</button>
            <button onclick="deleteClassData()" class="bg-red-900 px-3 py-2 rounded-xl text-[10px] font-black uppercase">Vider</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6 relative z-10">
        <div class="lg:col-span-2 bg-slate-800 rounded-[2rem] border border-slate-700 shadow-xl flex flex-col h-[78vh] overflow-hidden">
            <div class="flex bg-slate-900/80 border-b border-slate-700 relative z-30">
                <button onclick="switchTab('eleves')" id="tab-eleves" class="tab-btn flex-1 py-4 font-black uppercase text-[10px] tracking-widest text-slate-500 tab-active">👤 Élèves</button>
                <button onclick="switchTab('groupes')" id="tab-groupes" class="tab-btn flex-1 py-4 font-black uppercase text-[10px] tracking-widest text-slate-500">👥 Groupes</button>
                <button onclick="switchTab('history')" id="tab-history" class="tab-btn flex-1 py-4 font-black uppercase text-[10px] tracking-widest text-blue-400 italic">✏️ Modif</button>
            </div>

            <div id="view-eleves" class="no-scrollbar">
                <table class="w-full text-left">
                    <thead class="text-slate-500 text-[10px] uppercase tracking-widest sticky top-0 bg-slate-800 z-10">
                        <tr>
                            <th class="p-4">Nom de l'élève</th>
                            <th class="p-4 text-center">CODE (ex: 1A)</th>
                            <th class="p-4 text-center">Voies</th>
                            <th class="p-4 text-right pr-8">Points</th>
                        </tr>
                    </thead>
                    <tbody id="student-table-body"></tbody>
                </table>
            </div>
            
            <div id="view-groupes" class="hidden no-scrollbar"><table class="w-full text-left"><tbody id="group-table-body"></tbody></table></div>
            <div id="view-history" class="hidden no-scrollbar"><table class="w-full text-left text-[10px]"><tbody id="history-table-body"></tbody></table></div>
        </div>

        <div class="flex flex-col gap-4 h-[78vh]">
            <div class="bg-slate-800 p-6 rounded-[2rem] border border-slate-700 shadow-xl text-center"><div id="timer-display" class="text-6xl font-black tabular-nums tracking-tighter italic">60:00</div></div>
            <div class="bg-slate-800 p-6 rounded-[2rem] border border-slate-700 shadow-xl text-center">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-2 italic">Cumul Classe</p>
                <div class="text-4xl font-black text-emerald-400 mb-2"><span id="total-m">0</span>m</div>
                <div class="w-full h-3 bg-slate-900 rounded-full overflow-hidden border border-slate-700"><div id="progress-bar" class="h-full bg-emerald-500 transition-all duration-1000" style="width: 0%"></div></div>
            </div>
            <div class="bg-slate-800 p-5 rounded-[2rem] border border-slate-700 flex-grow overflow-hidden"><h3 class="text-[10px] font-bold text-blue-400 uppercase mb-3 italic">🏆 Top 5 Live</h3><div id="top-5-list" class="space-y-2 text-xs"></div></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyB9dpOvwWiiLEV8HDYWlSA00dcApfmBlcY", 
            databaseURL: "https://eps-escalade-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "eps-escalade" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const bareme = { "4a": 1, "4b": 1.1, "4c": 1.2, "5a": 1.3, "5b": 1.4, "5c": 1.5, "6a": 1.6, "6b": 1.8, "6c": 2 };

        let currentClass = localStorage.getItem('lastClass') || "DEMO";
        let students = [], assignments = {}, monteesRaw = {};
        let timeLeft = 3600, scrollInt = null, scrollDirection = 1, timerRunning = false;

        function init() {
            db.ref('active_classes').on('value', snap => {
                const select = document.getElementById('class-select');
                const data = snap.val() || { "DEMO": true };
                const classes = Object.keys(data);
                select.innerHTML = classes.map(c => `<option value="${c}" ${c === currentClass ? 'selected' : ''}>${c}</option>`).join('');
                loadClassData();
            });
        }

        function loadClassData() {
            students = JSON.parse(localStorage.getItem(`students_${currentClass}`)) || [];
            assignments = JSON.parse(localStorage.getItem(`assign_${currentClass}`)) || {};
            db.ref(currentClass + '/montees').off();
            db.ref(currentClass + '/montees').on('value', snap => {
                monteesRaw = snap.val() || {};
                renderAll();
            });
        }

        function renderAll() {
            const list = Object.entries(monteesRaw).map(([id, data]) => ({id, ...data}));
            let totalClasse = 0, groupStats = {}, studentScores = [];

            students.forEach(name => {
                const post = assignments[name] || "";
                const gNum = post.slice(0, -1), rLet = post.slice(-1);
                const perf = list.filter(m => post && m.groupe == gNum && m.role == rLet);
                const score = perf.reduce((a, b) => a + (parseFloat(b.points) || 0), 0);
                studentScores.push({name, score, voies: perf.length, post});
                totalClasse += score;
                if(gNum) {
                    if(!groupStats[gNum]) groupStats[gNum] = { id: gNum, voies: 0, metres: 0 };
                    groupStats[gNum].voies += perf.length; groupStats[gNum].metres += score;
                }
            });

            // RENDU TABLE ÉLÈVES AVEC COLONNE AFFECTATION CODE
            document.getElementById('student-table-body').innerHTML = studentScores.sort((a,b)=>a.name.localeCompare(b.name)).map(s => `
                <tr class="border-b border-white/5">
                    <td class="p-4 font-bold text-sm">${s.name}</td>
                    <td class="p-4 text-center">
                        <input type="text" value="${s.post}" onchange="setAssign('${s.name}', this.value)" 
                        placeholder="--" class="w-14 bg-slate-900 border border-slate-700 rounded text-center text-blue-400 font-black uppercase">
                    </td>
                    <td class="p-4 text-center text-slate-500 font-bold">${s.voies}</td>
                    <td class="p-4 text-right pr-8 font-black text-emerald-400">${s.score.toFixed(1)}</td>
                </tr>
            `).join('');

            // Rendu Groupes
            const sortedGroups = Object.values(groupStats).sort((a,b) => b.metres - a.metres);
            document.getElementById('group-table-body').innerHTML = sortedGroups.map((g, i) => {
                const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
                return `<tr class="border-b border-white/5"><td class="p-4 font-black text-lg">${medal} <span class="text-blue-400 ml-2 italic text-sm">GR. ${g.id}</span></td><td class="p-4 text-center font-bold text-slate-400 text-xs">${g.voies} v.</td><td class="p-4 text-right pr-8 font-black text-emerald-400 text-xl">${g.metres.toFixed(1)}m</td></tr>`;
            }).join('');

            // Top 5 Live
            document.getElementById('top-5-list').innerHTML = studentScores.sort((a,b) => b.score - a.score).slice(0, 5).map((s, i) => `
                <div class="flex justify-between items-center bg-white/5 p-2 rounded-lg border-l-4 border-blue-500">
                    <span class="font-bold text-[10px]">${i+1}. ${s.name.split(' ')[0]}</span>
                    <span class="font-black text-emerald-400">${s.score.toFixed(1)}</span>
                </div>
            `).join('');

            // Historique / Modif
            document.getElementById('history-table-body').innerHTML = list.slice().reverse().map(m => `
                <tr class="border-b border-white/5">
                    <td class="p-3 font-bold text-blue-300 uppercase">G${m.groupe}${m.role}</td>
                    <td class="p-3 text-center font-bold italic text-[9px]">V.${m.voie_num} (${m.couleur})</td>
                    <td class="p-3">
                        <select onchange="recalc('${m.id}', null, this.value)" class="bg-slate-900 border border-slate-700 rounded text-[10px] uppercase">
                            ${Object.keys(bareme).map(c => `<option value="${c}" ${m.cotation == c ? 'selected' : ''}>${c.toUpperCase()}</option>`).join('')}
                        </select>
                    </td>
                    <td class="p-3 font-black text-emerald-400">${(parseFloat(m.points) || 0).toFixed(1)}</td>
                    <td class="p-3 text-right"><button onclick="deleteEntry('${m.id}')">🗑️</button></td>
                </tr>
            `).join('');

            document.getElementById('total-m').innerText = Math.round(totalClasse);
            document.getElementById('progress-bar').style.width = Math.min((totalClasse/1000)*100, 100) + "%";
        }

        function setAssign(name, val) {
            assignments[name] = val.toUpperCase().trim();
            localStorage.setItem(`assign_${currentClass}`, JSON.stringify(assignments));
            renderAll();
        }

        function createNewClass() {
            const name = prompt("Nom de la classe (ex: 401) :");
            if(name) {
                const clean = name.trim().toUpperCase();
                db.ref('active_classes/' + clean).set(true).then(() => {
                    currentClass = clean; localStorage.setItem('lastClass', clean); location.reload();
                });
            }
        }

        function changeClass(v) { if(v) { currentClass = v; localStorage.setItem('lastClass', v); loadClassData(); } }
        function deleteEntry(id) { if(confirm("Supprimer ?")) db.ref(currentClass + '/montees').child(id).remove(); }
        function deleteClassData() { if(confirm("Vider les scores ?")) db.ref(currentClass + '/montees').remove(); }
        function switchTab(t) { ['eleves', 'groupes', 'history'].forEach(tab => { document.getElementById('view-'+tab).classList.toggle('hidden', tab !== t); document.getElementById('tab-'+tab).classList.toggle('tab-active', tab === t); }); }
        
        function startTimer() {
            if(timerRunning) return; timerRunning = true;
            setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer-display').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        function importStudents(input) {
            const reader = new FileReader(); reader.readAsText(input.files[0], "ISO-8859-1");
            reader.onload = (e) => {
                let l = e.target.result.split(/\r?\n/).map(r => r.replace(/;/g,' ').replace(/"/g,'').trim()).filter(r => r.length > 3);
                if(l.length > 0 && l[0].toLowerCase().includes("nom")) l.shift();
                students = l; localStorage.setItem(`students_${currentClass}`, JSON.stringify(students)); renderAll();
            };
        }

        init();
    </script>
</body>
</html>
